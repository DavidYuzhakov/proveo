<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>PROVEO - Выбирайте по результату, а не по словам</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Inter:300,regular,500,600,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Golos+Text:regular,500,600,700"
      rel="stylesheet"
    />
    <link href="assets/css/reset.css" rel="stylesheet" />
    <link href="assets/css/main.css" rel="stylesheet" />
    <link href="assets/css/search.css" rel="stylesheet" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="header-inner">
          <div class="header-left">
            <img class="header-logo" alt="PROVEO" src="./assets/img/logo.png" />
            <div class="header-divider"></div>
            <p class="header-slogan">
              Выбирайте по результату,<br />а не по словам
            </p>
          </div>
          <nav class="header-nav" aria-label="Основная навигация">
            <ul>
              <li><button type="button">Работы</button></li>
              <li><button type="button">Компании</button></li>
              <li><button type="button">Категории</button></li>
              <li><button type="button">Города</button></li>
            </ul>
          </nav>
          <div class="header-right">
            <button class="header-fav-btn" type="button" aria-label="Избранное">
              <svg
                width="26"
                height="26"
                viewBox="0 0 26 26"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M12.9998 23.4542C12.664 23.4542 12.339 23.4108 12.0682 23.3133C7.92984 21.8942 1.354 16.8567 1.354 9.41417C1.354 5.6225 4.41984 2.54584 8.18984 2.54584C10.0207 2.54584 11.7323 3.26084 12.9998 4.53917C14.2673 3.26084 15.979 2.54584 17.8098 2.54584C21.5798 2.54584 24.6457 5.63334 24.6457 9.41417C24.6457 16.8675 18.0698 21.8942 13.9315 23.3133C13.6607 23.4108 13.3357 23.4542 12.9998 23.4542ZM8.18984 4.17084C5.319 4.17084 2.979 6.52167 2.979 9.41417C2.979 16.8133 10.0965 20.93 12.599 21.7858C12.794 21.8508 13.2165 21.8508 13.4115 21.7858C15.9032 20.93 23.0315 16.8242 23.0315 9.41417C23.0315 6.52167 20.6915 4.17084 17.8207 4.17084C16.174 4.17084 14.6465 4.94 13.6607 6.2725C13.3573 6.68417 12.664 6.68417 12.3607 6.2725C11.3532 4.92917 9.8365 4.17084 8.18984 4.17084Z"
                  fill="black"
                />
              </svg>
            </button>
            <button class="header-login-btn" type="button">Войти</button>
            <button class="header-menu">
              <span></span>
            </button>
            <ul class="header-menu-nav">
              <li>Работы</li>
              <li>Компании</li>
              <li>Категории</li>
              <li>Города</li>
            </ul>
          </div>
        </div>
      </div>
    </header>
    <!-- MAIN CONTENT -->
    <main class="main-content">
      <section class="featured-header-section">
        <div class="featured-header-bg featured-header-bg--searchv2">
          <div class="featured-header-inner container">
            <h1 class="featured-header-title">Результаты поиска</h1>
            <div class="search-not-found">
              <p>Работы не найдены</p>
              <div class="search-not-found__info">
                <img src="./assets/icons/info.svg" alt="инфо" />
                <div class="search-not-found__message">
                  Попробуйте изменить запрос
                  <img src="./assets/icons/triangle.svg" alt="" />
                </div>
              </div>
            </div>
            <div class="search-bar-wrapper">
              <div class="search-bar search-bar--not-found">
                <img
                  class="search-icon"
                  src="./assets/icons/search.svg"
                  alt=""
                />
                <input
                  class="search-bar-input"
                  type="text"
                  placeholder="Например: строительство бассейна, ремонт квартиры"
                />
                <button class="clear-btn" type="button" hidden>
                  <img src="./assets/icons/close.svg" alt="очистить" />
                </button>
                <button class="search-bar-btn" type="button">Подобрать</button>
              </div>
              <div class="search-bar search-bar--mobile">
                <img
                  class="search-icon"
                  src="./assets/icons/search.svg"
                  alt=""
                />
                <input
                  class="search-bar-input"
                  type="text"
                  placeholder="Например: ремонт квартиры"
                />
                <button class="clear-btn" type="button" hidden>
                  <img src="./assets/icons/close.svg" alt="очистить" />
                </button>
              </div>
              <button class="btn search-btn" type="button">Подобрать</button>
            </div>
          </div>
        </div>
      </section>
      <!-- SITE FOOTER -->
    </main>
    <footer class="site-footer">
      <div class="site-footer-card">
        <div class="site-footer-left">
          <img
            class="site-footer-logo"
            alt="PROVEO"
            src="./assets/img/white-logo.png"
          />
          <div class="site-footer-divider"></div>
          <p class="site-footer-slogan">
            Выбирайте по результату,<br />а не по словам
          </p>
        </div>
        <nav class="site-footer-nav" aria-label="Нижняя навигация">
          <ul>
            <li>
              <span class="site-footer-copyright"
                >&copy; 2026 PROVEO. Все права защищены</span
              >
            </li>
            <li>
              <a class="site-footer-link" href="#"
                >Политика конфиденциальности</a
              >
            </li>
            <li><a class="site-footer-link" href="#">Контакты</a></li>
          </ul>
        </nav>
      </div>
    </footer>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/search.js"></script>
  </body>
</html>
